name: Build

on:
  workflow_call:
    inputs:
      run_integration_tests:
        description: Run services integration tests
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/install
        name: Install dependencies
        with:
          ts: "true"
          python: "false"

      - name: Build API client
        run: pnpm build --filter='./packages/api'
        env:
          UNPRICE_API_KEY: ""
          NODE_ENV: test

      - name: Type-check
        run: pnpm typecheck
        env:
          NODE_ENV: test

      - name: Validate ingestion durable object migrations
        run: pnpm --filter api db:check:ingestion:migrations

      - name: Check formatting
        run: pnpm biome ci .

      - name: Check workspaces
        run: pnpm manypkg check

      - name: Run tests
        run: pnpm test
        env:
          # fake database url
          DATABASE_URL: postgresql://postgresql:postgresql@localhost:5432/unprice
          NODE_ENV: test

  integration-tests:
    name: Services integration tests
    if: ${{ inputs.run_integration_tests }}
    runs-on: ubuntu-latest
    needs:
      - build
    services:
      db:
        image: postgres:15.6
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      pg_proxy:
        image: ghcr.io/neondatabase/wsproxy:latest
        env:
          ALLOW_ADDR_REGEX: ".*"
        ports:
          - 5433:80
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/install
        name: Install dependencies
        with:
          ts: "true"
          python: "false"

      - name: Run services integration tests
        run: pnpm --filter @unprice/services test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/unprice_test
          NODE_ENV: test
          APP_ENV: test
          SKIP_ENV_VALIDATION: "true"
