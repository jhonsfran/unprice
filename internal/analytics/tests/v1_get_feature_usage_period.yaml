- name: returns_hourly_latest_value_for_short_windows
  description: Verifies short start/end windows use hourly materialization semantics
  parameters: project_id=p1&customer_id=c1&period_key=period_mv&feature_slugs=f_period&start=4070908800000&end=4070912400000
  expected_result: |
    {"project_id":"p1","customer_id":"c1","feature_slug":"f_period","usage":5,"amount_after":500000000,"currency":"USD"}

