    {"facet":"event_slug","value":"entitlement.checked","event_count":1}
    {"facet":"event_slug","value":"usage.recorded","event_count":1}
    {"facet":"source_type","value":"api_key","event_count":1}
    {"facet":"source_type","value":"system","event_count":1}
    {"facet":"rejection_reason","value":"customer_not_found","event_count":1}
    {"facet":"rejection_reason","value":"missing_required_property","event_count":1}
    {"facet":"customer_id","value":"cus_1","event_count":2}

