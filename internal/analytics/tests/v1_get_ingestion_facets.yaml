    {"facet":"state","value":"failed","event_count":1}
    {"facet":"state","value":"rejected","event_count":1}
    {"facet":"event_slug","value":"usage.recorded","event_count":3}
    {"facet":"event_slug","value":"llm-tokens","event_count":1}
    {"facet":"source_type","value":"api_key","event_count":4}
    {"facet":"rejection_reason","value":"missing_required_property","event_count":1}
    {"facet":"customer_id","value":"cus_1","event_count":4}

