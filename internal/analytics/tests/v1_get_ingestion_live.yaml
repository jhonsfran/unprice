
- name: ingestion_live_counts
  description: Returns processed and rejected counts for a scoped customer
  parameters: project_id=proj_1&customer_id=cus_1&from_ts=4070908800000&to_ts=4070995200000
  expected_result: |
    {"second":"2099-01-01 00:00:01.000","processed":2,"rejected":0,"failed":0,"total":2}
    {"second":"2099-01-01 00:00:02.000","processed":0,"rejected":1,"failed":0,"total":1}
    {"second":"2099-01-01 00:00:03.000","processed":0,"rejected":1,"failed":0,"total":1}
    {"second":"2099-01-01 00:00:06.000","processed":0,"rejected":0,"failed":1,"total":1}

